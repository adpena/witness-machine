<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 930"
  role="img" aria-labelledby="temporal-title temporal-desc"
  style="display:block;width:100%;height:auto;max-width:1200px">
  <title id="temporal-title">Transport the strategy; measure when topology refuses</title>
  <desc id="temporal-desc">An advisory five-panel comparison of a real cached driving-scene
  segmentation at raw frame 392, its transport using a dense OpenCV Farneback
  flow estimate, the consecutive segmentation at raw frame 393, transport support, and a
  rematerialized three-level geometric strategy. This is not PoseNet, STAC DIS flow, or a score.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101f"/><stop offset="1" stop-color="#101b31"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000" flood-opacity=".32"/>
    </filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; }
      .eyebrow { fill:#7fd8ff; font-size:16px; font-weight:700; letter-spacing:2px; }
      .headline { fill:#f8fbff; font-size:42px; font-weight:760; }
      .dek { fill:#b9c8de; font-size:18px; }
      .metric { fill:#e8f0fb; font-size:16px; font-variant-numeric:tabular-nums; }
      .panel-title { fill:#f8fbff; font-size:18px; font-weight:700; }
      .panel-sub { fill:#9fb0c9; font-size:13px; }
      .panel-frame { fill:#0b1425; stroke:#31415e; stroke-width:1.5; filter:url(#shadow); }
      .foot { fill:#8fa2bd; font-size:13px; }
    </style>
  </defs>
  <rect width="1200" height="930" rx="28" fill="url(#bg)"/>
  <text class="eyebrow" x="40" y="48">TEMPORAL STRATEGY TRANSPORT · ADVISORY</text>
  <text class="headline" x="40" y="99">Transport the strategy.</text>
  <text class="headline" x="40" y="140">Measure when topology refuses.</text>
  <text class="dek" x="40" y="174">One real consecutive pair. One explicit receiver map. No hidden certainty.</text>
  <text class="metric" x="40" y="202">label debt 0.9%   ·   boundary debt 3.8%   ·   holes 1.6%   ·   collisions 1.2%</text>
  
    <g transform="translate(40 220)">
      <text class="panel-title" x="0" y="0">Frozen partition · raw frame 392</text>
      <text class="panel-sub" x="0" y="24">pair 196 · frozen SegNet argmax [ADVISORY]</text>
      <rect class="panel-frame" x="0" y="40" width="340" height="255" rx="14"/>
      <image href="data:image/png;base64," x="6" y="46" width="328" height="243"
             preserveAspectRatio="none" image-rendering="pixelated"/>
    </g>
    <g transform="translate(430 220)">
      <text class="panel-title" x="0" y="0">Transported partition</text>
      <text class="panel-sub" x="0" y="24">forward nearest splat of dense Farneback flow</text>
      <rect class="panel-frame" x="0" y="40" width="340" height="255" rx="14"/>
      <image href="data:image/png;base64," x="6" y="46" width="328" height="243"
             preserveAspectRatio="none" image-rendering="pixelated"/>
    </g>
    <g transform="translate(820 220)">
      <text class="panel-title" x="0" y="0">Observed partition · raw frame 393</text>
      <text class="panel-sub" x="0" y="24">pair 196 · next frozen SegNet argmax [ADVISORY]</text>
      <rect class="panel-frame" x="0" y="40" width="340" height="255" rx="14"/>
      <image href="data:image/png;base64," x="6" y="46" width="328" height="243"
             preserveAspectRatio="none" image-rendering="pixelated"/>
    </g>
    <g transform="translate(235 566)">
      <text class="panel-title" x="0" y="0">Receiver support</text>
      <text class="panel-sub" x="0" y="24">green valid · amber collision · coral hole</text>
      <rect class="panel-frame" x="0" y="40" width="340" height="255" rx="14"/>
      <image href="data:image/png;base64," x="6" y="46" width="328" height="243"
             preserveAspectRatio="none" image-rendering="pixelated"/>
    </g>
    <g transform="translate(625 566)">
      <text class="panel-title" x="0" y="0">Rematerialized strategy</text>
      <text class="panel-sub" x="0" y="24">boundary / annulus / interior [DERIVATION]</text>
      <rect class="panel-frame" x="0" y="40" width="340" height="255" rx="14"/>
      <image href="data:image/png;base64," x="6" y="46" width="328" height="243"
             preserveAspectRatio="none" image-rendering="pixelated"/>
    </g>
  <text class="foot" x="40" y="898">[ADVISORY] OpenCV Farneback image-space estimate · [DERIVATION] illustrative table bank [1,4,12]</text>
  <text class="foot" x="40" y="918">Not PoseNet · not STAC DIS flow · not a STAC reproduction · not an exact or proxy challenge score</text>
</svg>
