primary:
  id: stac_2022
  exact_title: "DNN-Driven Compressive Offloading for Edge-Assisted Semantic Video Segmentation"
  authors:
    - Xuedou Xiao
    - Juecheng Zhang
    - Wei Wang
    - Jianhua He
    - Qian Zhang
  venue: "IEEE INFOCOM 2022"
  arxiv_id: "2203.14481"
  arxiv_url: "https://arxiv.org/abs/2203.14481"
  alphaxiv_url: "https://www.alphaxiv.org/abs/2203.14481"
  doi: "10.1109/INFOCOM48880.2022.9796657"
  article_license: "CC BY-SA 4.0"
  evidence_class: EXTERNAL
  recreated_kernel:
    - first-order bounded-loss allocation q_i = 2B / (M |g_i|)
    - finite offline table bank and online regional table selection
    - compact table-level strategy map
  engaged_paper_finding:
    - boundary-only allocation is not a universal sensitivity oracle
  real_adaptation_evidence:
    - one locked frozen-SegNet pixel-space top-two-margin gradient on a fixed comma.ai pair
    - boundary-annulus mass accounting for raw summed-margin gradient magnitude and a heuristic margin-normalized sensitivity proxy
  not_yet_recreated:
    - STAC task-loss gradient in block-DCT coordinates
    - quantize/dequantize/IDCT or JPEG round trip
    - matched-rate regional-table codec comparison
    - dense-flow strategy transport
    - PSNR-style keyframe refresh decision
  not_attributed_to_paper:
    - PoseNet Fisher or six-coordinate motion extension
    - signed-distance carrier basis
    - Morse-Smale topology and persistence controller
    - max-plus/tropical or Laguerre generator parameterization
    - v7.5 single-trunk or v8 edge-centric architecture
    - comma.ai score or archive result

